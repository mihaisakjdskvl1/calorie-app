<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezultat Analiză AI</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Manrope', Arial, sans-serif;
        background: #f8f9fa;
        color: #333;
        line-height: 1.6;
      }
      
      .result-container {
        max-width: 100vw;
        padding: 1rem;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      
      .ai-img {
        width: 100%;
        max-width: 280px;
        height: 280px;
        object-fit: cover;
        border-radius: 1rem;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        margin-bottom: 1.5rem;
      }
      
      .ai-content {
        width: 100%;
        max-width: 400px;
        background: white;
        border-radius: 1.2rem;
        padding: 1.5rem;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      }
      
      .ai-content h3 {
        font-size: 1.4rem;
        font-weight: 700;
        color: #111;
        margin-bottom: 1rem;
        text-align: center;
      }
      
      .nutrition-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin: 1.5rem 0;
      }
      
      .nutrition-item {
        background: #f8f9fa;
        padding: 1rem;
        border-radius: 0.8rem;
        text-align: center;
      }
      
      .nutrition-value {
        font-size: 1.3rem;
        font-weight: 700;
        color: #111;
        margin-bottom: 0.3rem;
      }
      
      .nutrition-label {
        font-size: 0.9rem;
        color: #666;
        font-weight: 600;
      }
      
      .description-section {
        margin: 1.5rem 0;
        padding: 1rem;
        background: #f8f9fa;
        border-radius: 0.8rem;
      }
      
      .description-section h4 {
        font-size: 1rem;
        font-weight: 700;
        color: #111;
        margin-bottom: 0.5rem;
      }
      
      .description-text {
        font-size: 0.95rem;
        color: #555;
        line-height: 1.5;
      }
      
      /* log is auto-saved on upload.html; result page is display-only */

      #backHomeBtn {
        width: 100%;
        background: #111;
        color: #fff;
        border: none;
        border-radius: 1rem;
        padding: 1rem;
        font-size: 1.1rem;
        font-weight: 800;
        cursor: pointer;
        margin-top: 1.2rem;
        transition: background 0.2s;
      }
      #backHomeBtn:hover { background: #333; }
      
      .success-message {
        color: #28a745;
        font-weight: 600;
        text-align: center;
        margin-top: 1rem;
        padding: 0.8rem;
        background: #d4edda;
        border-radius: 0.5rem;
      }
      
      @media (max-width: 600px) {
        .result-container {
          padding: 0.8rem;
        }
        
        .ai-img {
          max-width: 240px;
          height: 240px;
          margin-bottom: 1rem;
        }
        
        .ai-content {
          padding: 1.2rem;
        }
        
        .ai-content h3 {
          font-size: 1.2rem;
        }
        
        .nutrition-grid {
          grid-template-columns: 1fr;
          gap: 0.8rem;
        }
        
        .nutrition-value {
          font-size: 1.2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="result-container">
      <div id="result"></div>
    </div>
    <script>
      // Prefer pending data (set in upload.html), fallback to legacy keys.
      let outputRaw = localStorage.getItem('pending_ai_output') || localStorage.getItem('last_ai_output');
      let imgData = localStorage.getItem('pending_ai_image') || localStorage.getItem('last_ai_image');
      let pendingLogDate = localStorage.getItem('pending_ai_log_date') || null;
      if (!outputRaw || !imgData) {
        document.getElementById('result').innerHTML = `
          <div style="color:red;margin:2rem auto;text-align:center;max-width:400px;">Nu există date de afișat. Te rugăm să reîncarci o imagine sau să reiei procesul de analiză.</div>
          <button onclick="window.location.href='home.html'" style="margin-top:2rem;padding:0.9rem 2.2rem;font-size:1.1rem;border:none;border-radius:1.5rem;background:#111;color:#fff;cursor:pointer;font-weight:700;">Înapoi la home</button>
        `;
        throw new Error('Fără date pentru afișare');
      }
      let output = {};
      try {
        output = JSON.parse(outputRaw);
        if (Array.isArray(output)) output = output[0];
        if (output && output.output) output = output.output;
        if (typeof output === 'string') output = JSON.parse(output);
      } catch (e) { output = {}; }

      const baseCalories = parseFloat(output.calories) || 0;
      const baseProtein = parseFloat(output.protein) || 0;
      const baseCarbs = parseFloat(output.carbs) || 0;
      const baseFats = parseFloat(output.fats) || parseFloat(output.fat) || 0;
      const baseDescription = (output.description || '').toString().trim();
      const baseName = (output.name || output.food_name || output.food || (baseDescription ? baseDescription.split('\n')[0] : 'Food')).slice(0, 60);

      function computeHealthScore(cals, protein, carbs, fats) {
        // Simple heuristic: less fat relative to calories => better score.
        if (!cals || cals <= 0) return 0;
        const fatCal = fats * 9;
        const ratio = fatCal / cals; // 0..1+
        let score = 10 - Math.round((ratio - 0.25) * 12);
        score = Math.max(1, Math.min(10, score));
        return score;
      }

      const baseHealthScore = computeHealthScore(baseCalories, baseProtein, baseCarbs, baseFats);
      const baseHealthSuggestion = (output.health_suggestion || '').toString().trim();

      // Default log date = today if missing
      const logDateStr = pendingLogDate || new Date().toDateString();

      let qty = 1;

      function formatQtyValue(n) {
        const q = Math.max(1, parseInt(n, 10) || 1);
        return q;
      }

      function timeHHMM(d) {
        return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
      }

      function render() {
        const scaledCalories = Math.round(baseCalories * qty);
        const scaledProtein = Math.round(baseProtein * qty);
        const scaledCarbs = Math.round(baseCarbs * qty);
        const scaledFats = Math.round(baseFats * qty);

        document.getElementById('qtyVal').textContent = String(qty);
        document.getElementById('calVal').textContent = String(scaledCalories);
        document.getElementById('proteinVal').textContent = scaledProtein + 'g';
        document.getElementById('carbsVal').textContent = scaledCarbs + 'g';
        document.getElementById('fatsVal').textContent = scaledFats + 'g';

        document.getElementById('healthScoreVal').textContent = `${baseHealthScore}/10`;
        const pct = baseHealthScore / 10;
        document.getElementById('healthScoreBar').style.width = `${pct * 100}%`;
      }

      document.getElementById('result').innerHTML = `
        <div class="r-hero">
          <img src="${imgData}" alt="Poza aliment" class="r-hero-img">
          <div class="r-hero-title">Nutrition</div>
        </div>
        <div class="r-sheet">
          <div class="r-title-row">
            <div class="r-time">${timeHHMM(new Date())}</div>
            <div class="r-food-name">${baseName}</div>
            <div class="r-stepper">
              <button class="r-step-btn" id="qtyMinus" aria-label="Decrease">-</button>
              <span class="r-step-qty"><span id="qtyVal">1</span></span>
              <button class="r-step-btn" id="qtyPlus" aria-label="Increase">+</button>
            </div>
          </div>

          <div class="r-cal-card">
            <div class="r-cal-label">Calories</div>
            <div class="r-cal-value"><span id="calVal">${Math.round(baseCalories)}</span></div>
          </div>

          <div class="r-macro-row">
            <div class="r-macro-card">
              <div class="r-macro-label">Protein</div>
              <div class="r-macro-value" id="proteinVal">${Math.round(baseProtein)}g</div>
            </div>
            <div class="r-macro-card">
              <div class="r-macro-label">Carbs</div>
              <div class="r-macro-value" id="carbsVal">${Math.round(baseCarbs)}g</div>
            </div>
            <div class="r-macro-card">
              <div class="r-macro-label">Fats</div>
              <div class="r-macro-value" id="fatsVal">${Math.round(baseFats)}g</div>
            </div>
          </div>

          <div class="r-health">
            <div class="r-health-top">
              <div class="r-health-title">Health Score</div>
              <div class="r-health-score" id="healthScoreVal">${baseHealthScore}/10</div>
            </div>
            <div class="r-health-bar">
              <div class="r-health-bar-fill" id="healthScoreBar" style="width:${(baseHealthScore/10)*100}%;"></div>
            </div>
          </div>

          ${
            baseDescription ? `
              <div class="r-section">
                <div class="r-section-title">Details</div>
                <div class="r-section-text">${baseDescription}</div>
              </div>
            ` : ''
          }
          ${
            baseHealthSuggestion ? `
              <div class="r-section">
                <div class="r-section-title">Health suggestion</div>
                <div class="r-section-text">${baseHealthSuggestion}</div>
              </div>
            ` : ''
          }

          <div class="r-actions">
            <button class="r-fix-btn" id="fixBtn" type="button">Fix Results</button>
            <button class="r-done-btn" id="doneBtn" type="button">Done</button>
          </div>
        </div>
      `;

      // Inject minimal styles for this page
      (function injectStyles() {
        const styleId = 'resultPageExtraStyles';
        if (document.getElementById(styleId)) return;
        const s = document.createElement('style');
        s.id = styleId;
        s.textContent = `
          .r-hero{width:100%;max-width:430px;margin:0 auto;position:relative;}
          .r-hero-img{width:100%;height:220px;object-fit:cover;border-radius:1.2rem 1.2rem 0 0;display:block;}
          .r-hero-title{position:absolute;left:50%;top:18px;transform:translateX(-50%);background:rgba(0,0,0,0.35);color:#fff;font-weight:900;padding:0.35rem 0.85rem;border-radius:999px;font-size:0.95rem;}
          .r-sheet{width:100%;max-width:430px;margin:0 auto;background:#fff;border-radius:0 0 1.2rem 1.2rem;padding:1.1rem 1rem 1.2rem;box-shadow:0 2px 14px rgba(0,0,0,0.08);box-sizing:border-box;}
          .r-title-row{display:flex;flex-direction:column;gap:0.3rem;margin-bottom:1rem;}
          .r-time{color:#888;font-weight:700;font-size:0.9rem;text-align:left;}
          .r-food-name{font-size:1.25rem;font-weight:900;color:#111;line-height:1.2;}
          .r-stepper{display:flex;align-items:center;justify-content:flex-end;gap:0.6rem;position:absolute;right:1.1rem;margin-top:-2.2rem;}
          .r-step-btn{width:34px;height:34px;border-radius:10px;border:none;background:#f2f2f2;font-weight:900;cursor:pointer;}
          .r-step-qty{min-width:22px;text-align:center;font-weight:900;background:#fff;border:2px solid #eee;border-radius:12px;padding:0.35rem 0.55rem;}
          .r-cal-card{background:#f5f7fa;border-radius:1rem;padding:0.9rem 0.9rem;margin-bottom:1rem;}
          .r-cal-label{color:#777;font-weight:800;font-size:0.92rem;margin-bottom:0.35rem;}
          .r-cal-value{font-size:2rem;font-weight:950;color:#111;}
          .r-macro-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;margin-bottom:1rem;}
          .r-macro-card{background:#f7f7f7;border-radius:1rem;padding:0.7rem 0.55rem;text-align:left;}
          .r-macro-label{color:#555;font-weight:800;font-size:0.9rem;margin-bottom:0.35rem;}
          .r-macro-value{font-weight:950;font-size:1.25rem;color:#111;}
          .r-health{background:#f7f7f7;border-radius:1rem;padding:0.85rem 0.8rem;margin-bottom:1rem;}
          .r-health-top{display:flex;align-items:center;justify-content:space-between;gap:0.8rem;margin-bottom:0.65rem;}
          .r-health-title{font-weight:950;color:#111;}
          .r-health-score{font-weight:950;color:#111;}
          .r-health-bar{height:8px;background:#e8e8e8;border-radius:999px;overflow:hidden;}
          .r-health-bar-fill{height:100%;background:#2ea44f;border-radius:999px;}
          .r-section{background:#fff;border:1px solid #f0f0f0;border-radius:1rem;padding:0.85rem 0.8rem;margin-bottom:0.9rem;}
          .r-section-title{font-weight:950;margin-bottom:0.45rem;}
          .r-section-text{color:#444;font-size:0.95rem;line-height:1.35;white-space:pre-wrap;}
          .r-actions{display:flex;gap:0.75rem;margin-top:0.5rem;}
          .r-fix-btn{flex:1;border-radius:1rem;border:2px solid #111;background:#fff;color:#111;font-weight:950;padding:0.95rem 0.6rem;cursor:pointer;}
          .r-done-btn{flex:1.1;border-radius:1rem;border:none;background:#111;color:#fff;font-weight:950;padding:0.95rem 0.6rem;cursor:pointer;}
        `;
        document.head.appendChild(s);
      })();

      // Wire stepper
      document.getElementById('qtyMinus').onclick = function() {
        qty = formatQtyValue(qty - 1);
        render();
      };
      document.getElementById('qtyPlus').onclick = function() {
        qty = formatQtyValue(qty + 1);
        render();
      };
      document.getElementById('fixBtn').onclick = function() {
        // Just scroll to stepper to make it feel like "Fix Results"
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      function saveScaledLog() {
        const dateObj = new Date(logDateStr);
        const dayKey = 'log_' + dateObj.toDateString();
        let logs = JSON.parse(localStorage.getItem(dayKey) || '[]');
        const firstScanToday = logs.length === 0;

        const now = new Date();
        const entry = {
          food: qty === 1 ? baseName : `${baseName} x${qty}`,
          calories: Math.round(baseCalories * qty),
          protein: Math.round(baseProtein * qty),
          carbs: Math.round(baseCarbs * qty),
          fat: Math.round(baseFats * qty),
          time: timeHHMM(now),
          suggestion: baseHealthSuggestion || '',
          image: imgData || null
        };
        logs.unshift(entry);
        localStorage.setItem(dayKey, JSON.stringify(logs));

        // Streak: increase only on first scan of that day
        if (firstScanToday) {
          const todayKey = dateObj.toDateString();
          const yesterday = new Date(dateObj);
          yesterday.setDate(yesterday.getDate() - 1);
          const yesterdayKey = yesterday.toDateString();

          let streak = parseInt(localStorage.getItem('streak') || '0', 10);
          if (!Number.isFinite(streak) || streak < 0) streak = 0;
          const lastLogDate = localStorage.getItem('last_log_date');

          if (lastLogDate === yesterdayKey) streak = streak + 1;
          else streak = 1;
          localStorage.setItem('streak', String(streak));
          localStorage.setItem('last_log_date', todayKey);
        }
      }

      document.getElementById('doneBtn').onclick = function() {
        saveScaledLog();

        // Clear pending scan data
        localStorage.removeItem('pending_ai_output');
        localStorage.removeItem('pending_ai_image');
        localStorage.removeItem('pending_ai_log_date');

        // Keep last_ai_* for re-opening, but they are harmless
        window.location.href = 'home.html';
      };

      render();
    </script>
  </body>
</html>
