<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload</title>
  </head>
  <body style="margin:0;padding:0;">
    <div id="error" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.2rem;color:#fff;background:rgba(0,0,0,0.8);z-index:1000;text-align:center;"></div>
    <div id="result" style="display:none;"></div>
    <script>
      const imgData = localStorage.getItem('pending_upload_image');
      let lastOutput = null;
      function showError(msg) {
        const errorDiv = document.getElementById('error');
        errorDiv.innerHTML = `<div>${msg}</div><button id='retryBtn' style='margin-top:2rem;padding:0.7rem 2.2rem;font-size:1.1rem;border:none;border-radius:1.5rem;background:#fff;color:#111;cursor:pointer;font-weight:700;'>Încearcă din nou</button>`;
        errorDiv.style.display = 'flex';
        document.getElementById('retryBtn').onclick = function() {
          window.location.href = 'home.html';
        };
      }
      function saveScanToDailyLog(output, imageDataUrl) {
        if (!output) return;
        const today = new Date();
        const dayKey = 'log_' + today.toDateString();
        let logs = JSON.parse(localStorage.getItem(dayKey) || '[]');
        const entry = {
          food: output.description || 'Food',
          calories: parseFloat(output.calories) || 0,
          protein: parseFloat(output.protein) || 0,
          carbs: parseFloat(output.carbs) || 0,
          fat: parseFloat(output.fats) || parseFloat(output.fat) || 0,
          time: today.getHours().toString().padStart(2,'0') + ':' + today.getMinutes().toString().padStart(2,'0'),
          suggestion: output.health_suggestion || '',
          image: imageDataUrl || null
        };
        logs.unshift(entry);
        localStorage.setItem(dayKey, JSON.stringify(logs));
        localStorage.setItem('last_scan_saved_at', today.toISOString());
      }
      function normalizeWebhookResponse(data) {
        let d = data;
        if (Array.isArray(d)) d = d[0];
        if (d && typeof d === 'object' && d.output) d = d.output;
        if (d && d.response && d.response.output) d = d.response.output;
        if (d && typeof d === 'string') {
          try { d = JSON.parse(d); } catch (e) {}
        }
        if (d && d.output) d = d.output;
        return d;
      }
      async function postImageToWebhook({ blob, file, url }) {
        // Prefer same-origin proxy to avoid CORS
        try {
          const res = await fetch('/api/analyze', {
            method: 'POST',
            headers: {
              'Content-Type': blob.type || 'application/octet-stream'
            },
            body: blob,
          });
          const text = await res.text();
          if (!res.ok) throw new Error(`HTTP ${res.status}: ${text}`);
          if (!text || !text.trim()) throw new Error('Webhook returned empty response body');
          return JSON.parse(text);
        } catch (e) {
          // Fallback: direct n8n call (requires CORS enabled in n8n)
          const formData = new FormData();
          formData.append('data', file);
          formData.append('image', file);
          const res = await fetch(url, { method: 'POST', mode: 'cors', body: formData });
          const text = await res.text();
          if (!res.ok) throw new Error(`HTTP ${res.status}: ${text}`);
          if (!text || !text.trim()) throw new Error('Webhook returned empty response body');
          return JSON.parse(text);
        }
      }
      if (imgData) {
        fetch(imgData)
          .then(res => res.blob())
          .then(blob => {
            const file = new File([blob], 'photo.jpg', { type: 'image/jpeg' });
            const debugDiv = document.getElementById('error');
            debugDiv.style.display = 'flex';
            debugDiv.innerHTML = `<div style='color:#fff;background:#222;padding:1rem 1.5rem;border-radius:1rem;margin-bottom:1rem;'>Processing image…</div>`;
            const url = 'https://moshnoi2000.app.n8n.cloud/webhook/539ed024-e9d2-4fd7-a928-ae14b53f4c0c';
            (async () => {
              try {
                const data = await postImageToWebhook({ blob, file, url });
                localStorage.removeItem('pending_upload_image');
                const output = normalizeWebhookResponse(data);
                lastOutput = output;
                localStorage.setItem('last_ai_output', JSON.stringify(output));
                localStorage.setItem('last_ai_image', imgData);
                saveScanToDailyLog(output, imgData);
                window.location.href = 'result.html';
              } catch (err) {
                const msg = (err && err.message) ? err.message : String(err || '');
                const isFailedToFetch = /Failed to fetch/i.test(msg);
                const hint = isFailedToFetch
                  ? `<div style="margin-top:0.8rem;color:#fff;max-width:90vw;">
                      Cel mai probabil request-ul este blocat de browser (CORS) către n8n.<br>
                      Soluția recomandată: pornește aplicația cu <b>dev-server.mjs</b> (proxy local) și requestul va merge fără CORS.<br>
                      Alternativ, în n8n trebuie CORS: <b>Access-Control-Allow-Origin</b> + <b>OPTIONS</b>.
                    </div>`
                  : '';
                showError('❌ Eroare la procesare imagine. Încearcă din nou.<br><br><b>Detalii:</b><br><pre style="white-space:pre-wrap;text-align:left;max-width:90vw;overflow-x:auto;">' + msg + '</pre>' + hint);
              }
            })();
          });
      }
    </script>
  </body>
</html>
